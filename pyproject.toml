    "xcore",
]

[tool.uv.sources]
xcore = { git = "https://www.github.com/traoreera/xcore.git" }


[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]
