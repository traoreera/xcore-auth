[project]
name = "auth"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiosmtplib>=5.1.0",
    "argon2>=0.1.10",
    "argon2-cffi>=25.1.0",
    "asyncpg>=0.31.0",
    "cryptography>=46.0.6",
    "geoip2>=5.2.0",
    "pillow>=12.1.1",
    "pydantic[email]>=2.12.5",
    "pyotp>=2.9.0",
    "qrcode>=8.2",
